# =============================================================
# Traefik v3.3 — Static Configuration
# Eirdom Infrastructure
# =============================================================

# -----------------------------------------------------------
# API & Dashboard
# Dashboard is exposed via router in dynamic config
# Protected by Authentik ForwardAuth middleware
# -----------------------------------------------------------
api:
  dashboard: true
  insecure: false

# Enable ping health check
ping: {}

# -----------------------------------------------------------
# Entrypoints
# web     — HTTP  port 80  (redirects to websecure globally)
# websecure — HTTPS port 443
# -----------------------------------------------------------
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    forwardedHeaders:
      trustedIPs:
        172.18.0.0/16
    http:
      tls:
        certResolver: cloudflare
        domains:
          # Hardcoded — Traefik does NOT expand ${VAR} in this static
          # file (see AUDIT C1). Update if ROOT_DOMAIN ever changes.
          - main: "eirdom.homes"
            sans:
              - "*.eirdom.homes"

# -----------------------------------------------------------
# Certificate Resolvers
# Wildcard cert via Cloudflare DNS challenge
# Covers *.eirdom.homes and eirdom.homes
# -----------------------------------------------------------
certificatesResolvers:
  cloudflare:
    acme:
      # Hardcoded — Traefik does NOT expand ${VAR} in this static file
      # (see AUDIT C1). A literal "${TRAEFIK_ACME_EMAIL}" makes Let's
      # Encrypt reject registration. Set your real contact email here.
      email: "hostmaster@eirdom.homes"
      storage: /certs/acme.json
      caServer: "https://acme-v02.api.letsencrypt.org/directory"
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "9.9.9.9:53"
        delayBeforeCheck: "30s"

# -----------------------------------------------------------
# Providers
# Docker provider — auto-discovers containers via labels
# File provider  — loads dynamic config from /config/dynamic/
# -----------------------------------------------------------
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy
    watch: true

  file:
    directory: /etc/traefik/dynamic
    watch: true

# -----------------------------------------------------------
# Logging
# Access logs to disk for Wazuh ingestion
# Error logs to stdout for Docker log collection
# -----------------------------------------------------------
log:
  level: INFO
  filePath: /logs/traefik.log
  format: json

accessLog:
  filePath: /logs/access.log
  format: json
  bufferingSize: 100
  filters:
    statusCodes:
      - "400-599"
    retryAttempts: true
    minDuration: "10ms"
  fields:
    defaultMode: keep
    names:
      ClientUsername: drop
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        Authorization: drop
        Content-Type: keep

# -----------------------------------------------------------
# Metrics (optional — for future Prometheus integration)
# -----------------------------------------------------------
metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true
