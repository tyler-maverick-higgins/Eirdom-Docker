# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json
# =============================================================
# Recyclarr Configuration — Eirdom
# Syncs TRaSH Guides quality profiles and custom formats
# to all four ARR instances (HD + 4K)
#
# Docs: https://recyclarr.dev/wiki/
# TRaSH Guides: https://trash-guides.info/
#
# Fill in API keys from docker/arr-stack/.env after first start
# Place this file at: ${DOCKER_DATA_PATH}/recyclarr/recyclarr.yml
# =============================================================

radarr:

  # -----------------------------------------------------------
  # Radarr HD — 1080p movies
  # Quality profile: HD-1080p (TRaSH recommended)
  # Custom formats: blocks scene garbage, prefers better encodes
  # -----------------------------------------------------------
  radarr-hd:
    base_url: http://radarr:7878
    api_key: !secret radarr_api_key

    quality_profiles:
      - name: HD-1080p

    media_naming:
      folder: default
      movie:
        rename: true
        standard: default

    quality_definition:
      type: movie

    custom_formats:
      # ---- Unwanted formats — score -10000 (effectively blocked) ----
      - trash_ids:
          - ed38b889b31be83fda192888e2286d83  # BR-DISK (uncompressed disc rip)
          - 90a6f9a284dff5103f6346090e6280c8  # LQ (low quality releases)
          - dc98083864ea246d05a0166db24f7a0d  # x265 (720/1080p penalize)
          - b8cd450cbfa689c0259a01d9e29ba3d6  # 3D
          - bfd8eb01832d646a0a89c4deb46f8564  # Upscaled
        assign_scores_to:
          - name: HD-1080p
            score: -10000

      # ---- Preferred formats — higher score = preferred ----
      - trash_ids:
          - e7718d7a3ce595f289bfee26adc178f5  # Repack/Proper
          - ae43b294509409a6a13919dedd4764c4  # MPEG2
          - 9170d55c319f4fe40da8711ba9d8050d  # Dolby Vision
          - 496f355514737f7d83bf7aa4d24f8169  # TrueHD Atmos
          - 2f22d89048b01681dde8afe203bf2e95  # DTS X
          - 417804f7f2c4308c1f4c83d6acaaf454  # ATMOS (undefined)
          - 1af239278386be2919e1bcee0bde047e  # DD+ ATMOS
          - 3cafb66171b47f226146a0770576870f  # TrueHD
          - dcf3ec6938fa32445f590a4da84256cd  # DTS-HD MA
        assign_scores_to:
          - name: HD-1080p
            score: 10

  # -----------------------------------------------------------
  # Radarr 4K — 2160p/UHD movies
  # Quality profile: 4K-2160p (TRaSH recommended)
  # Prefers Dolby Vision + TrueHD Atmos for best quality
  # Direct play only — no transcoding on this server
  # -----------------------------------------------------------
  radarr-4k:
    base_url: http://radarr-4k:7878
    api_key: !secret radarr_4k_api_key

    quality_profiles:
      - name: 4K-2160p

    media_naming:
      folder: default
      movie:
        rename: true
        standard: default

    quality_definition:
      type: movie

    custom_formats:
      # ---- Unwanted ----
      - trash_ids:
          - ed38b889b31be83fda192888e2286d83  # BR-DISK
          - 90a6f9a284dff5103f6346090e6280c8  # LQ
          - b8cd450cbfa689c0259a01d9e29ba3d6  # 3D
          - bfd8eb01832d646a0a89c4deb46f8564  # Upscaled
          - 9f98181fe5a3fbeb0cc29340da2a468a  # AV1 (poor compatibility)
        assign_scores_to:
          - name: 4K-2160p
            score: -10000

      # ---- HDR formats — strongly preferred for 4K ----
      - trash_ids:
          - 9170d55c319f4fe40da8711ba9d8050d  # Dolby Vision
          - 2b239ed870daba8126a53bd5dc8dc1c8  # DV HDR10+
          - 7878c33f1963fefb3d6c8657d46c2f0a  # DV HDR10
          - 1f733af03141f068a540eec352589a89  # DV HLG
          - 6d0d8de7b57e35518ac0308b0ddf404e  # DV (no title)
          - 58d6a88f13e2db7f5059c41047876f00  # HDR
          - 9364dd386c22b173b21a9c4d3bce1cd8  # HDR10+
          - e61e28db95d22bedcadf030b8f156d96  # HDR10
          - 2a4d9069cc1fe3242ff9bdaebed239bb  # HDR (undefined)
        assign_scores_to:
          - name: 4K-2160p
            score: 15

      # ---- Audio — preferred for best home theatre experience ----
      - trash_ids:
          - 496f355514737f7d83bf7aa4d24f8169  # TrueHD Atmos
          - 2f22d89048b01681dde8afe203bf2e95  # DTS X
          - 417804f7f2c4308c1f4c83d6acaaf454  # ATMOS (undefined)
          - 1af239278386be2919e1bcee0bde047e  # DD+ ATMOS
          - 3cafb66171b47f226146a0770576870f  # TrueHD
          - dcf3ec6938fa32445f590a4da84256cd  # DTS-HD MA
        assign_scores_to:
          - name: 4K-2160p
            score: 10

      # ---- Repack/Proper ----
      - trash_ids:
          - e7718d7a3ce595f289bfee26adc178f5  # Repack/Proper
        assign_scores_to:
          - name: 4K-2160p
            score: 5

sonarr:

  # -----------------------------------------------------------
  # Sonarr HD — 1080p TV shows
  # Quality profile: HD-1080p
  # -----------------------------------------------------------
  sonarr-hd:
    base_url: http://sonarr:8989
    api_key: !secret sonarr_api_key

    quality_profiles:
      - name: HD-1080p

    media_naming:
      series: default
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

    quality_definition:
      type: series

    custom_formats:
      # ---- Unwanted ----
      - trash_ids:
          - 85c61753df5da1fb2aab6f2a47426b09  # BR-DISK
          - 9c11cd3f07101cdba90a2d81cf0e56b4  # LQ
          - fbcb31d8dabd2a319072b84fc0b7249c  # Upscaled
          - 15a05bc7c1a36e2b57fd628f8977e2fc  # AV1
          - 3bc5f395426614e155e585a2f056cdf1  # No-RlsGroup
        assign_scores_to:
          - name: HD-1080p
            score: -10000

      # ---- Preferred ----
      - trash_ids:
          - e7718d7a3ce595f289bfee26adc178f5  # Repack/Proper
          - 496f355514737f7d83bf7aa4d24f8169  # TrueHD Atmos
          - 1af239278386be2919e1bcee0bde047e  # DD+ ATMOS
          - 3cafb66171b47f226146a0770576870f  # TrueHD
          - dcf3ec6938fa32445f590a4da84256cd  # DTS-HD MA
        assign_scores_to:
          - name: HD-1080p
            score: 10

  # -----------------------------------------------------------
  # Sonarr 4K — 2160p TV shows
  # Quality profile: 4K-2160p
  # Same HDR/audio preferences as Radarr 4K
  # -----------------------------------------------------------
  sonarr-4k:
    base_url: http://sonarr-4k:8989
    api_key: !secret sonarr_4k_api_key

    quality_profiles:
      - name: 4K-2160p

    media_naming:
      series: default
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

    quality_definition:
      type: series

    custom_formats:
      # ---- Unwanted ----
      - trash_ids:
          - 85c61753df5da1fb2aab6f2a47426b09  # BR-DISK
          - 9c11cd3f07101cdba90a2d81cf0e56b4  # LQ
          - fbcb31d8dabd2a319072b84fc0b7249c  # Upscaled
          - 9f98181fe5a3fbeb0cc29340da2a468a  # AV1
          - 3bc5f395426614e155e585a2f056cdf1  # No-RlsGroup
        assign_scores_to:
          - name: 4K-2160p
            score: -10000

      # ---- HDR — strongly preferred ----
      - trash_ids:
          - 9170d55c319f4fe40da8711ba9d8050d  # Dolby Vision
          - 7878c33f1963fefb3d6c8657d46c2f0a  # DV HDR10
          - 58d6a88f13e2db7f5059c41047876f00  # HDR
          - e61e28db95d22bedcadf030b8f156d96  # HDR10
        assign_scores_to:
          - name: 4K-2160p
            score: 15

      # ---- Audio ----
      - trash_ids:
          - 496f355514737f7d83bf7aa4d24f8169  # TrueHD Atmos
          - 1af239278386be2919e1bcee0bde047e  # DD+ ATMOS
          - 3cafb66171b47f226146a0770576870f  # TrueHD
          - dcf3ec6938fa32445f590a4da84256cd  # DTS-HD MA
        assign_scores_to:
          - name: 4K-2160p
            score: 10

      # ---- Repack/Proper ----
      - trash_ids:
          - e7718d7a3ce595f289bfee26adc178f5  # Repack/Proper
        assign_scores_to:
          - name: 4K-2160p
            score: 5

# =============================================================
