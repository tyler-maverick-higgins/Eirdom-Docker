# =============================================================
# Eirdom — Stirling PDF
# Local PDF processing — merge, split, compress, OCR, convert
# Replaces all online PDF tools (no data leaves the network)
#
# Authentication: Authentik ForwardAuth (chain-standard)
# Storage: Stateless — no persistent data needed
# =============================================================

services:

  # -----------------------------------------------------------
  # Stirling PDF — PDF manipulation toolkit
  # Fully stateless — no database, no persistent data
  # All processing happens in-memory and files are not stored
  # -----------------------------------------------------------
  stirling-pdf:
    image: stirlingtools/stirling-pdf:alpha@sha256:218b8be693e8e276bb501b3ff0efd148ad054a67a2e7d6f6398925c7958b4139
    container_name: stirling-pdf
    env_file:
      - ../.env
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      DOCKER_ENABLE_SECURITY: "false"
      # Authentik handles auth via chain-standard — no need
      # for Stirling's built-in login system
      SECURITY_ENABLE_LOGIN: "false"
      SYSTEM_DEFAULTLOCALE: en-US
      UI_APP_NAME: "Eirdom PDF"
      # Allow large file uploads (default 50MB — increase for
      # large PDFs like architectural plans)
      SYSTEM_MAXFILESIZE: "100"
    volumes:
      - ${DOCKER_DATA_PATH}/stirling-pdf/configs:/configs
      - ${DOCKER_DATA_PATH}/stirling-pdf/logs:/logs
      # Uncomment to add custom fonts or training data for OCR
      # - ${DOCKER_DATA_PATH}/stirling-pdf/tessdata:/usr/share/tesseract-ocr/5/tessdata
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stirling-pdf.rule=Host(`pdf.${ROOT_DOMAIN}`)"
      - "traefik.http.routers.stirling-pdf.entrypoints=websecure"
      - "traefik.http.routers.stirling-pdf.tls=true"
      - "traefik.http.routers.stirling-pdf.tls.certresolver=cloudflare"
      - "traefik.http.services.stirling-pdf.loadbalancer.server.port=8080"
      # chain-standard — Authentik SSO
      - "traefik.http.routers.stirling-pdf.middlewares=chain-standard@file"
      - "traefik.docker.network=proxy"

networks:
  proxy:
    external: true